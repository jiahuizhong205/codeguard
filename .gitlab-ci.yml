stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -e ".[dev]"
  script:
    - pytest tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+\%)$/'

docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t codeguard:latest .
  only:
    - main
    - master

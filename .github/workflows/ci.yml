name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run mechanism demo
        run: |
          python -m codeguard demo

      - name: Credential safety check
        run: |
          if grep -rn --include="*.py" -E "sk-[a-zA-Z0-9]{10,}" src/; then
            echo "Found hardcoded API key pattern"
            exit 1
          fi
          echo "No hardcoded credentials found"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t codeguard:latest .
